name: supercine_app
description: "Supercine — App de filmes e séries com layout elegante estilo HBO Max."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & state
  http: ^1.2.2
  provider: ^6.1.2

  # Storage
  shared_preferences: ^2.3.2

  # UI helpers
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Video
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
